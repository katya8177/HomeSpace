<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HomeSpace - Семейный органайзер</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(78, 204, 163, 0.2) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(255, 215, 0, 0.15) 0%, transparent 50%);
            animation: pulse 12s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            margin: 20px;
        }

        .card {
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px 30px;
            border: 1px solid rgba(78, 204, 163, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 80px;
            margin-bottom: 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #4ecca3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(44, 62, 80, 0.8);
            border: 1px solid rgba(78, 204, 163, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4ecca3;
            box-shadow: 0 0 10px rgba(78, 204, 163, 0.3);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ecca3, #3ba87f);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 204, 163, 0.4);
        }

        .btn-secondary {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid #4ecca3;
            color: #4ecca3;
        }

        .btn-secondary:hover {
            background: rgba(78, 204, 163, 0.3);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .role-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            background: rgba(44, 62, 80, 0.8);
            border: 1px solid rgba(78, 204, 163, 0.3);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .role-btn.active {
            background: linear-gradient(135deg, #4ecca3, #3ba87f);
            border-color: transparent;
        }

        .avatars-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }

        .avatar-option {
            width: 50px;
            height: 50px;
            background: rgba(44, 62, 80, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .avatar-option:hover {
            transform: scale(1.1);
            background: rgba(78, 204, 163, 0.3);
        }

        .avatar-option.selected {
            border-color: #4ecca3;
            background: rgba(78, 204, 163, 0.2);
        }

        .family-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .family-btn {
            flex: 1;
            padding: 12px;
            background: rgba(44, 62, 80, 0.8);
            border: 1px solid rgba(78, 204, 163, 0.3);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
        }

        .family-btn.active {
            background: linear-gradient(135deg, #4ecca3, #3ba87f);
            border-color: transparent;
        }

        .message {
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        .message-error {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            color: #e94560;
        }

        .message-success {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid #4ecca3;
            color: #4ecca3;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .link {
            text-align: center;
            margin-top: 20px;
        }

        .link a {
            color: #4ecca3;
            text-decoration: none;
            cursor: pointer;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(78, 204, 163, 0.5);
        }

        .modal-content h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            background: rgba(44, 62, 80, 0.8);
            border: 1px solid rgba(78, 204, 163, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            .role-buttons {
                flex-direction: column;
            }
            .family-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-screen" class="screen active">
            <div class="card">
                <div class="logo">
                    <div class="logo-icon">🏠</div>
                    <h1>HomeSpace</h1>
                    <p>Семейный органайзер</p>
                </div>
                <div id="login-message"></div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" id="login-btn">Войти</button>
                <div class="link">
                    <a id="show-register">Нет аккаунта? Зарегистрироваться</a>
                </div>
            </div>
        </div>

        <div id="register-screen" class="screen">
            <div class="card">
                <div class="logo">
                    <div class="logo-icon">✨</div>
                    <h1>Регистрация</h1>
                    <p>Создайте свой аккаунт</p>
                </div>
                <div id="register-message"></div>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="reg-name" placeholder="Ваше имя">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="reg-password" placeholder="минимум 3 символа">
                </div>
                <div class="form-group">
                    <label>Кто вы?</label>
                    <div class="role-buttons">
                        <div class="role-btn" data-role="parent">👑 Родитель</div>
                        <div class="role-btn active" data-role="child">🧒 Ребёнок</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Аватар</label>
                    <div class="avatars-grid" id="avatars-grid">
                        <div class="avatar-option selected">👧</div>
                        <div class="avatar-option">👦</div>
                        <div class="avatar-option">👩</div>
                        <div class="avatar-option">👨</div>
                        <div class="avatar-option">🧑</div>
                        <div class="avatar-option">🐱</div>
                        <div class="avatar-option">🐶</div>
                        <div class="avatar-option">🦊</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Семья</label>
                    <div class="family-buttons">
                        <div class="family-btn active" data-family="none">🚫 Без семьи</div>
                        <div class="family-btn" data-family="create">✨ Создать</div>
                        <div class="family-btn" data-family="join">🔑 Присоединиться</div>
                    </div>
                </div>
                <button class="btn btn-primary" id="register-btn">Зарегистрироваться</button>
                <div class="link">
                    <a id="show-login">Уже есть аккаунт? Войти</a>
                </div>
            </div>
        </div>

        <div id="menu-screen" class="screen">
            <div class="card">
                <div class="logo">
                    <div class="logo-icon">🏠</div>
                    <h1>HomeSpace</h1>
                    <p id="menu-user-info">Загрузка...</p>
                </div>
                <div id="family-code-info" style="text-align: center; margin-bottom: 20px; padding: 10px; background: rgba(78,204,163,0.1); border-radius: 20px;">
                    <span style="color: #ffd700;">🏷️ Код семьи:</span>
                    <span id="family-code-display" style="color: white; font-family: monospace;">—</span>
                    <button id="copy-family-code" style="background: none; border: none; color: #4ecca3; cursor: pointer;">📋</button>
                </div>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button class="btn btn-primary" data-page="editor">🏠 Редактор комнаты</button>
                    <button class="btn btn-primary" data-page="tasks">📋 Задания</button>
                    <button class="btn btn-primary" data-page="chat">💬 Семейный чат</button>
                    <button class="btn btn-primary" data-page="wishes">🎁 Магазин желаний</button>
                    <button class="btn btn-secondary" data-page="settings">⚙️ Настройки</button>
                </div>
                <div class="link" style="margin-top: 20px;">
                    <a id="logout-btn">🚪 Выйти</a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="family-code-modal">
        <div class="modal-content">
            <h3>🔑 Введите код приглашения</h3>
            <input type="text" id="family-code-input" placeholder="XXXXXX" style="text-transform: uppercase;">
            <div class="modal-buttons">
                <button class="btn-secondary" id="modal-cancel">Отмена</button>
                <button class="btn-primary" id="modal-confirm">Присоединиться</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';
        let currentUser = null;
        let selectedRole = 'child';
        let selectedAvatar = '👧';
        let selectedFamilyAction = 'none';
        let familyCodeToJoin = '';

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        function showMessage(elementId, text, isError = true) {
            const el = document.getElementById(elementId);
            if (el) {
                el.innerHTML = `<div class="message ${isError ? 'message-error' : 'message-success'}">${text}</div>`;
                setTimeout(() => {
                    if (el.innerHTML === `<div class="message ${isError ? 'message-error' : 'message-success'}">${text}</div>`) {
                        el.innerHTML = '';
                    }
                }, 3000);
            }
        }

        function saveUser(user, token) {
            localStorage.setItem('homespace_currentUser', JSON.stringify(user));
            localStorage.setItem('homespace_token', token);
            currentUser = user;
        }

        function loadCurrentUser() {
            const saved = localStorage.getItem('homespace_currentUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    return true;
                } catch (e) {
                    return false;
                }
            }
            return false;
        }

        function updateMenuUI() {
            if (currentUser) {
                const roleIcon = currentUser.role === 'parent' ? '👑' : '🧒';
                document.getElementById('menu-user-info').innerHTML = `${roleIcon} ${currentUser.name} | Бонусы: ${currentUser.bonuses || 0}💰`;
                const familyCode = currentUser.familyInviteCode || currentUser.familyCode || '—';
                document.getElementById('family-code-display').textContent = familyCode;
                if (familyCode !== '—') {
                    document.getElementById('copy-family-code').style.display = 'inline-block';
                } else {
                    document.getElementById('copy-family-code').style.display = 'none';
                }
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) {
                showMessage('login-message', 'Заполните все поля');
                return;
            }
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Ошибка входа');
                }
                saveUser(data.user, data.token);
                showMessage('login-message', 'Вход выполнен!', false);
                setTimeout(() => {
                    updateMenuUI();
                    showScreen('menu-screen');
                }, 500);
            } catch (error) {
                showMessage('login-message', error.message);
            }
        }

        async function register() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            if (!name || !email || !password) {
                showMessage('register-message', 'Заполните все поля');
                return;
            }
            if (password.length < 3) {
                showMessage('register-message', 'Пароль должен быть минимум 3 символа');
                return;
            }
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name, email, password,
                        role: selectedRole,
                        avatar: selectedAvatar,
                        familyAction: selectedFamilyAction,
                        familyCode: familyCodeToJoin
                    })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Ошибка регистрации');
                }
                saveUser(data.user, data.token);
                showMessage('register-message', 'Регистрация успешна!', false);
                setTimeout(() => {
                    updateMenuUI();
                    showScreen('menu-screen');
                }, 500);
            } catch (error) {
                showMessage('register-message', error.message);
            }
        }

        function logout() {
            localStorage.removeItem('homespace_currentUser');
            localStorage.removeItem('homespace_token');
            currentUser = null;
            showScreen('login-screen');
        }

        function navigateTo(page) {
            if (page === 'editor') {
                window.location.href = '/public/game.html';
            } else {
                window.location.href = `/${page}.html`;
            }
        }

        function setupEventListeners() {
            document.getElementById('show-register').onclick = () => showScreen('register-screen');
            document.getElementById('show-login').onclick = () => showScreen('login-screen');
            document.getElementById('logout-btn').onclick = logout;
            document.getElementById('login-btn').onclick = login;
            document.getElementById('register-btn').onclick = register;
            document.querySelectorAll('[data-page]').forEach(btn => {
                btn.onclick = () => navigateTo(btn.dataset.page);
            });
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedRole = btn.dataset.role;
                };
            });
            document.querySelectorAll('.avatar-option').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.avatar-option').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedAvatar = btn.textContent;
                };
            });
            document.querySelectorAll('.family-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.family-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedFamilyAction = btn.dataset.family;
                    if (selectedFamilyAction === 'join') {
                        document.getElementById('family-code-modal').classList.add('active');
                    }
                };
            });
            document.getElementById('modal-cancel').onclick = () => {
                document.getElementById('family-code-modal').classList.remove('active');
                document.querySelector('.family-btn[data-family="none"]').click();
            };
            document.getElementById('modal-confirm').onclick = () => {
                familyCodeToJoin = document.getElementById('family-code-input').value.trim().toUpperCase();
                document.getElementById('family-code-modal').classList.remove('active');
            };
            document.getElementById('copy-family-code').onclick = () => {
                const code = document.getElementById('family-code-display').textContent;
                if (code && code !== '—') {
                    navigator.clipboard.writeText(code);
                    alert('✅ Код скопирован!');
                }
            };
            document.getElementById('login-password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') login();
            });
            document.getElementById('reg-password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') register();
            });
        }

        if (loadCurrentUser()) {
            updateMenuUI();
            showScreen('menu-screen');
        } else {
            showScreen('login-screen');
        }
        setupEventListeners();
    </script>
</body>
</html>
