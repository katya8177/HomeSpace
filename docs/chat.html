<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HomeSpace - Семейный чат</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(78, 204, 163, 0.15) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            animation: pulse 12s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* Кнопка назад */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(78, 204, 163, 0.5);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(78, 204, 163, 0.3);
            border-color: #4ecca3;
            transform: translateX(-3px);
        }

        /* Основной контейнер чата */
        .chat-app {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* Боковая панель */
        .chat-sidebar {
            width: 300px;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(78, 204, 163, 0.3);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(78, 204, 163, 0.2);
        }

        .sidebar-header h2 {
            color: #ffd700;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .sidebar-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 5px;
        }

        /* Информация о пользователе */
        .user-info {
            padding: 20px;
            background: rgba(78, 204, 163, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(78, 204, 163, 0.2);
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4ecca3, #ffd700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.3);
            overflow: hidden;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .user-role {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 2px;
        }

        /* Список участников */
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.2s ease;
        }

        .user-item:hover {
            background: rgba(78, 204, 163, 0.15);
        }

        .user-item.active {
            background: rgba(78, 204, 163, 0.3);
            border-left: 3px solid #4ecca3;
        }

        .user-item-avatar {
            width: 40px;
            height: 40px;
            background: #2c3e50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            overflow: hidden;
        }

        .user-item-info {
            flex: 1;
        }

        .user-item-name {
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .user-item-role {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .online-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ecca3;
            box-shadow: 0 0 8px #4ecca3;
        }

        .online-indicator.offline {
            background: #666;
            box-shadow: none;
        }

        /* Основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(5px);
        }

        .chat-header {
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(78, 204, 163, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-title-icon {
            font-size: 24px;
        }

        .refresh-btn {
            background: rgba(78, 204, 163, 0.2);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
            color: white;
        }

        .refresh-btn:hover {
            background: rgba(78, 204, 163, 0.4);
            transform: rotate(90deg);
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 70%;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            background: #2c3e50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar-image { width: 100%; height: 100%; object-fit: cover; }
        .avatar-initials { font-size: 14px; font-weight: 700; color: #fff; }

        .message-content {
            background: rgba(44, 62, 80, 0.9);
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 100%;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #4ecca3, #3ba87f);
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            color: #ffd700;
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 14px;
            color: #ffffff;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            text-align: right;
        }

        .empty-messages {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-messages-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Панель ввода */
        .chat-input-area {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(78, 204, 163, 0.2);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: rgba(44, 62, 80, 0.9);
            border: 1px solid rgba(78, 204, 163, 0.5);
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            transition: all 0.2s ease;
        }

        .chat-input:focus {
            border-color: #4ecca3;
            box-shadow: 0 0 10px rgba(78, 204, 163, 0.3);
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .send-btn {
            background: linear-gradient(135deg, #4ecca3, #3ba87f);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.4);
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .chat-sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                bottom: 0;
                z-index: 1000;
                transition: left 0.3s ease;
            }

            .chat-sidebar.open {
                left: 0;
            }

            .message {
                max-width: 85%;
            }

            .back-btn {
                top: 10px;
                left: 10px;
                padding: 8px 16px;
                font-size: 14px;
            }
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: #4ecca3;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ffd700;
        }
    </style>
</head>
<body>
    <div style="display: flex; gap: 10px; position: fixed; top: 20px; left: 20px; z-index: 100;">
        <button class="back-btn" id="close-btn" style="background: rgba(233, 69, 96, 0.8); border-color: #e94560;">
            ✕ Закрыть
        </button>
        <button class="back-btn" onclick="window.location.href='/'">
            ← Назад в меню
        </button>
    </div>

    <div class="chat-app">
        <div class="chat-sidebar" id="chat-sidebar">
            <div class="sidebar-header">
                <h2>Семейный чат</h2>
                <p>Общайтесь всей семьёй</p>
            </div>
            <div class="user-info" id="user-info">
                <div class="user-avatar" id="user-avatar"></div>
                <div class="user-details">
                    <div class="user-name" id="user-name">Загрузка...</div>
                    <div class="user-role" id="user-role"></div>
                </div>
            </div>
            <div class="users-list" id="users-list">
                <div style="text-align:center;padding:20px;color:#666;">Загрузка участников...</div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-title" id="chat-title">
                    <span class="chat-title-icon">Чат</span>
                    <span>Семейный чат</span>
                </div>
                <button class="refresh-btn" id="refresh-btn" title="Обновить">⟳</button>
            </div>

            <div class="messages-area" id="messages-area">
                <div class="empty-messages">
                    <div class="empty-messages-icon">Чат</div>
                    <div>Нет сообщений</div>
                    <div style="font-size:12px; margin-top:8px;">Напишите первое сообщение!</div>
                </div>
            </div>

            <div class="chat-input-area">
                <textarea class="chat-input" id="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
                <button class="send-btn" id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';
        let token = localStorage.getItem('homespace_token');
        let currentUser = null;
        let currentChat = { type: 'family', userId: null, userName: null };
        let messages = [];
        let users = [];
        let refreshInterval = null;
        let sidebarOpen = false;
        let unreadCount = 0;
        let isTabFlashing = false;
        const baseTitle = document.title;

        function closeWebView() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('close-webview', '*');
            } else {
                window.location.href = '/';
            }
        }
// Адаптация к размеру окна в WebView
    function handleResize() {
        // Если мы внутри iframe, сообщаем родителю о готовности
        if (window.parent && window.parent !== window) {
            // Сообщаем, что страница загружена
            window.parent.postMessage('ready', '*');
        }
        
        // Адаптируем контейнер под размер iframe
        const container = document.querySelector('.container');
        if (container && window.innerWidth < 768) {
            container.style.padding = '15px';
        }
    }
    
    // Слушаем сообщения от родителя
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'resize') {
            // Обновляем размеры при необходимости
            document.body.style.margin = '0';
            document.body.style.padding = '0';
        }
    });
    
    // Запускаем при загрузке
    window.addEventListener('load', handleResize);
    window.addEventListener('resize', handleResize);
    handleResize();
        // Инициализация
        async function init() {
            await loadCurrentUser();
            if (!token || !currentUser) {
                // Если нет пользователя, но мы в WebView, закрываем
                if (window.parent !== window) {
                    closeWebView();
                } else {
                    window.location.href = '/';
                }
                return;
            }
            
            // Настраиваем кнопку закрытия
            const closeBtn = document.getElementById('close-btn');
            if (closeBtn) {
                closeBtn.onclick = closeWebView;
            }
            
            await loadUsers();
            await loadMessages();
            setupEventListeners();
            startAutoRefresh();
            setupMobileMenu();
        }

        async function loadCurrentUser() {
            const saved = localStorage.getItem('homespace_currentUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    token = localStorage.getItem('homespace_token');
                    
                    const userNameEl = document.getElementById('user-name');
                    const userAvatarEl = document.getElementById('user-avatar');
                    const userRoleEl = document.getElementById('user-role');
                    
                    if (userNameEl) userNameEl.textContent = currentUser.name || 'Пользователь';
                    if (userAvatarEl) userAvatarEl.innerHTML = getAvatarHtml(currentUser.avatar, currentUser.name);
                    
                    const roleText = currentUser.role === 'parent' ? 'Родитель' : 'Ребёнок';
                    if (userRoleEl) userRoleEl.textContent = roleText;
                } catch (e) {
                    console.error('Ошибка загрузки пользователя:', e);
                }
            }
        }

        async function loadUsers() {
            if (!currentUser?.familyId) {
                console.log('Нет familyId');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/families/${currentUser.familyId}/members`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Ошибка загрузки');
                
                users = await response.json();
                renderUsers();
            } catch (error) {
                console.error('Ошибка загрузки участников:', error);
                const usersList = document.getElementById('users-list');
                if (usersList) {
                    usersList.innerHTML = '<div style="text-align:center;padding:20px;color:#e94560;">Ошибка загрузки</div>';
                }
            }
        }

        function renderUsers() {
            const container = document.getElementById('users-list');
            if (!container) return;
            
            const familyBtn = document.createElement('div');
            familyBtn.className = `user-item ${currentChat.type === 'family' ? 'active' : ''}`;
            familyBtn.innerHTML = `
                    <div class="user-item-avatar"><span class="avatar-initials">CH</span></div>
                <div class="user-item-info">
                    <div class="user-item-name">Семейный чат</div>
                    <div class="user-item-role">Общий чат семьи</div>
                </div>
                <div class="online-indicator"></div>
            `;
            familyBtn.onclick = () => switchToFamilyChat();
            
            container.innerHTML = '';
            container.appendChild(familyBtn);
            
            users.forEach(user => {
                if (user.id === currentUser?.id) return;
                
                const isActive = currentChat.type === 'private' && currentChat.userId === user.id;
                const isOnline = user.last_login && (new Date() - new Date(user.last_login)) < 5 * 60 * 1000;
                
                const userDiv = document.createElement('div');
                userDiv.className = `user-item ${isActive ? 'active' : ''}`;
                userDiv.innerHTML = `
                    <div class="user-item-avatar">${getAvatarHtml(user.avatar, user.name)}</div>
                    <div class="user-item-info">
                        <div class="user-item-name">${escapeHtml(user.name)}</div>
                        <div class="user-item-role">${user.role === 'parent' ? 'Родитель' : 'Ребёнок'}</div>
                    </div>
                    <div class="online-indicator ${isOnline ? '' : 'offline'}"></div>
                `;
                userDiv.onclick = () => switchToPrivateChat(user);
                container.appendChild(userDiv);
            });
        }

        async function loadMessages() {
            if (!currentUser?.familyId) return;
            
            try {
                let url = `${API_URL}/chat?`;
                
                if (currentChat.type === 'private' && currentChat.userId) {
                    url += `type=private&withUserId=${currentChat.userId}`;
                } else {
                    url += `type=family`;
                }
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Ошибка загрузки');
                
                messages = await response.json();
                renderMessages();
            } catch (error) {
                console.error('Ошибка загрузки сообщений:', error);
            }
        }

        function renderMessages() {
            const area = document.getElementById('messages-area');
            if (!area) return;
            
            if (!messages || messages.length === 0) {
                area.innerHTML = `
                    <div class="empty-messages">
                        <div class="empty-messages-icon">Чат</div>
                        <div>Нет сообщений</div>
                        <div style="font-size:12px; margin-top:8px;">Напишите первое сообщение!</div>
                    </div>
                `;
                return;
            }
            
            area.innerHTML = '';
            
            let lastDateLabel = '';
            messages.forEach(msg => {
                const dateLabel = formatMessageDate(new Date(msg.created_at));
                if (dateLabel !== lastDateLabel) {
                    const sep = document.createElement('div');
                    sep.style.textAlign = 'center';
                    sep.style.fontSize = '12px';
                    sep.style.color = 'rgba(255,255,255,0.55)';
                    sep.style.margin = '6px 0';
                    sep.textContent = dateLabel;
                    area.appendChild(sep);
                    lastDateLabel = dateLabel;
                }
                const isOwn = msg.user_id === currentUser?.id;
                const isBot = msg.type === 'bot';
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isOwn ? 'own' : ''}`;
                
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">${isOwn ? getAvatarHtml(currentUser?.avatar, currentUser?.name) : getAvatarHtml(msg.user_avatar, msg.user_name)}</div>
                    <div class="message-content">
                        ${!isOwn && !isBot ? `<div class="message-sender">${escapeHtml(msg.user_name || 'Пользователь')}</div>` : ''}
                        <div class="message-text">${escapeHtml(msg.message)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                area.appendChild(messageDiv);
            });
            
            area.scrollTop = area.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            if (!input) return;
            
            const message = input.value.trim();
            if (!message) return;
            
            input.value = '';
            input.style.height = 'auto';
            
            try {
                const body = {
                    message: message,
                    type: currentChat.type
                };
                
                if (currentChat.type === 'private' && currentChat.userId) {
                    body.recipientId = currentChat.userId;
                }
                
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                
                if (!response.ok) throw new Error('Ошибка отправки');
                
                await loadMessages();
            } catch (error) {
                console.error('Ошибка отправки:', error);
                alert('Не удалось отправить сообщение');
                input.value = message;
            }
        }

        function switchToFamilyChat() {
            currentChat = { type: 'family', userId: null, userName: null };
            const chatTitle = document.getElementById('chat-title');
            if (chatTitle) {
                chatTitle.innerHTML = '<span class="chat-title-icon">Чат</span><span>Семейный чат</span>';
            }
            renderUsers();
            loadMessages();
            
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('chat-sidebar');
                if (sidebar) sidebar.classList.remove('open');
                sidebarOpen = false;
            }
        }

        function switchToPrivateChat(user) {
            currentChat = { type: 'private', userId: user.id, userName: user.name };
            const chatTitle = document.getElementById('chat-title');
            if (chatTitle) {
                chatTitle.innerHTML = `<span class="chat-title-icon">Чат</span><span>Чат с ${escapeHtml(user.name)}</span>`;
            }
            renderUsers();
            loadMessages();
            
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('chat-sidebar');
                if (sidebar) sidebar.classList.remove('open');
                sidebarOpen = false;
            }
        }

        function setupEventListeners() {
            const sendBtn = document.getElementById('send-btn');
            const refreshBtn = document.getElementById('refresh-btn');
            const input = document.getElementById('message-input');
            
            if (sendBtn) sendBtn.onclick = sendMessage;
            if (refreshBtn) refreshBtn.onclick = () => loadMessages();
            
            if (input) {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
                
                input.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });
            }
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            let prevLastId = messages[messages.length - 1]?.id || null;
            refreshInterval = setInterval(() => {
                loadMessages().then(() => {
                    const latest = messages[messages.length - 1];
                    const latestId = latest?.id || null;
                    if (latestId && prevLastId && latestId !== prevLastId && latest?.user_id !== currentUser?.id) {
                        unreadCount += 1;
                        updateUnreadIndicator();
                        flashTab();
                    }
                    prevLastId = latestId || prevLastId;
                });
            }, 5000);
        }

        function setupMobileMenu() {
            const sidebar = document.getElementById('chat-sidebar');
            const header = document.querySelector('.chat-header');
            
            if (window.innerWidth <= 768 && header && sidebar) {
                header.style.cursor = 'pointer';
                header.addEventListener('click', (e) => {
                    if (e.target.closest('.refresh-btn')) return;
                    sidebarOpen = !sidebarOpen;
                    sidebar.classList.toggle('open', sidebarOpen);
                });
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMessageDate(date) {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.toDateString() === today.toDateString()) return 'Сегодня';
            if (date.toDateString() === yesterday.toDateString()) return 'Вчера';
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function updateUnreadIndicator() {
            const chatTitle = document.getElementById('chat-title');
            if (!chatTitle) return;
            const badge = unreadCount > 0 ? ` (${unreadCount})` : '';
            const titleText = currentChat.type === 'private' && currentChat.userName
                ? `Чат с ${currentChat.userName}${badge}`
                : `Семейный чат${badge}`;
            chatTitle.innerHTML = `<span class="chat-title-icon">Чат</span><span>${escapeHtml(titleText)}</span>`;
        }

        function flashTab() {
            if (isTabFlashing) return;
            isTabFlashing = true;
            let count = 0;
            const interval = setInterval(() => {
                document.title = count % 2 === 0 ? 'Новое сообщение' : baseTitle;
                count += 1;
                if (count > 6) {
                    clearInterval(interval);
                    document.title = baseTitle;
                    isTabFlashing = false;
                }
            }, 500);
        }

        function getAvatarHtml(avatar, name) {
            if (avatar && avatar.startsWith('/assets/uploads/')) {
                return `<img class="avatar-image" src="${escapeHtml(avatar)}" alt="${escapeHtml(name || 'avatar')}">`;
            }
            const base = (name || 'П').trim();
            const parts = base.split(/\s+/).filter(Boolean).slice(0, 2);
            const initials = parts.map(p => p[0]?.toUpperCase() || '').join('') || 'U';
            return `<span class="avatar-initials">${escapeHtml(initials)}</span>`;
        }

        // Запуск
        init();
    </script>
</body>
</html>
