<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HomeSpace - Редактор комнаты</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(78, 204, 163, 0.15) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        #game-container {
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 800px;
            position: relative;
            z-index: 10;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        /* Только горизонтальная ориентация */
        @media (orientation: portrait) {
            body::after {
                content: "⟲ Пожалуйста, поверните устройство";
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.85);
                color: white;
                padding: 16px 32px;
                border-radius: 40px;
                font-size: 16px;
                z-index: 9999;
                white-space: nowrap;
                border: 2px solid #4ecca3;
                backdrop-filter: blur(5px);
            }
            #game-container {
                opacity: 0.3;
                pointer-events: none;
            }
        }

        .back-to-menu {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(78, 204, 163, 0.5);
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .back-to-menu:hover {
            background: rgba(78, 204, 163, 0.3);
            border-color: #4ecca3;
        }

        #ui-root {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 200;
        }

        #ui-root * {
            pointer-events: auto;
        }

        .panel {
            position: absolute;
            top: 60px;
            left: 12px;
            width: min(320px, 85vw);
            max-height: calc(100% - 80px);
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(78, 204, 163, 0.55);
            border-radius: 18px;
            overflow-y: auto;
            box-shadow: 0 18px 40px rgba(0,0,0,0.35);
            transition: width 0.2s ease;
        }

        .panel[data-open="false"] {
            width: 56px;
        }

        .panel[data-open="false"] .panel__title,
        .panel[data-open="false"] .panel__body {
            display: none;
        }

        .panel__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            background: rgba(15, 15, 26, 0.95);
            z-index: 5;
        }

        .panel__title {
            font-weight: 800;
            letter-spacing: 0.3px;
            font-size: 15px;
        }

        .icon-btn {
            appearance: none;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(44, 62, 80, 0.7);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            border-color: rgba(78, 204, 163, 0.7);
        }

        .panel__body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .label {
            font-size: 12px;
            color: rgba(255,255,255,0.75);
            padding: 0 2px;
        }

        .select {
            flex: 1;
            min-width: 120px;
            padding: 8px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(22, 33, 62, 0.65);
            color: #fff;
            outline: none;
            cursor: pointer;
        }

        .select:focus {
            border-color: rgba(78, 204, 163, 0.75);
        }

        .input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(22, 33, 62, 0.65);
            color: #fff;
            outline: none;
        }

        .input::placeholder {
            color: rgba(255,255,255,0.55);
        }

        .input:focus {
            border-color: rgba(78, 204, 163, 0.75);
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(44, 62, 80, 0.55);
            color: #fff;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chip:hover {
            border-color: rgba(78, 204, 163, 0.55);
        }

        .chip[aria-selected="true"] {
            border-color: rgba(78, 204, 163, 0.85);
            background: rgba(78, 204, 163, 0.18);
        }

        .chip--danger {
            border-color: rgba(233, 69, 96, 0.55);
            background: rgba(233, 69, 96, 0.18);
        }

        .furniture-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            max-height: 260px;
            padding-right: 4px;
        }

        .furniture-item {
            display: grid;
            grid-template-columns: 38px 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 10px 8px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(35, 41, 49, 0.55);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .furniture-item:hover {
            border-color: rgba(78, 204, 163, 0.55);
            transform: translateX(3px);
        }

        .furniture-emoji {
            font-size: 22px;
            text-align: center;
        }

        .furniture-name {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.1;
        }

        .furniture-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
        }

        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(35, 41, 49, 0.55);
            border-radius: 10px;
            cursor: pointer;
        }

        .room-item.active {
            border: 1px solid #4ecca3;
            background: rgba(78, 204, 163, 0.2);
        }

        .room-select-btn, .room-delete-btn {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(78,204,163,0.2);
            border: 1px solid #4ecca3;
            color: white;
            margin-left: 5px;
        }

        .room-delete-btn {
            border-color: #e94560;
            color: #e94560;
        }

        #editor-error {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #e94560;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            z-index: 10000;
            font-size: 14px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: crisp-edges;
        }

        @media (max-width: 768px) {
            .panel {
                top: 50px;
                left: 8px;
                width: calc(100% - 16px);
                max-width: 360px;
            }
            .chip {
                padding: 10px 14px;
                font-size: 14px;
            }
            .furniture-item {
                padding: 12px 10px;
            }
            .back-to-menu {
                top: 8px;
                left: 8px;
                padding: 6px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="back-to-menu">
        ← Назад в меню
    </a>

    <div id="game-container">
        <div id="game"></div>
        <div id="ui-root">
            <aside id="furniture-panel" class="panel" data-open="true">
                <div class="panel__header">
                    <div class="panel__title">🪑 Мебель</div>
                    <button id="furniture-toggle" class="icon-btn" type="button">⟨</button>
                </div>
                <div class="panel__body">
                    <div class="row">
                        <button id="snap-toggle" class="chip" type="button">📐 Сетка: выкл</button>
                        <button id="delete-selected" class="chip chip--danger" type="button">🗑 Удалить</button>
                        <button id="lock-selected" class="chip" type="button">🔒 Закрепить</button>
                        <button id="unlock-selected" class="chip" type="button">🔓 Разблок.</button>
                        <button id="view-tasks-btn" class="chip" type="button">📋 Задания</button>
                    </div>
                    
                    <div class="row">
                        <label class="label">🏠 Мои комнаты</label>
                    </div>
                    <div id="rooms-list" class="rooms-list"></div>
                    <div class="row">
                        <button id="new-room-btn" class="chip" style="width:100%;">➕ Новая комната</button>
                    </div>
                    
                    <div class="row">
                        <label class="label">🎨 Фон</label>
                        <select id="bg-select" class="select"></select>
                        <button id="upload-bg-btn" class="chip">📷 Своё</button>
                    </div>
                    
                    <div class="row">
                        <input id="furniture-search" class="input" type="search" placeholder="🔍 Поиск мебели..." />
                    </div>
                    
                    <div id="furniture-categories" class="chips" role="tablist">
                        <button class="chip" data-category="all" aria-selected="true">📦 Все</button>
                        <button class="chip" data-category="base">🧱 Стены</button>
                        <button class="chip" data-category="bathroom">🚿 Ванная</button>
                        <button class="chip" data-category="bedroom">🛏 Спальня</button>
                        <button class="chip" data-category="kitchen">🍳 Кухня</button>
                        <button class="chip" data-category="livingroom">🛋 Гостиная</button>
                        <button class="chip" data-category="decor">🎨 Декор</button>
                        <button class="chip" data-category="electronics">📱 Электроника</button>
                        <button class="chip" data-category="rooms">🏠 Комнаты</button>
                    </div>
                    
                    <div id="furniture-list" class="furniture-list">
                        <div style="text-align:center;padding:20px;">📦 Загрузка...</div>
                    </div>
                    
                    <div class="row" style="justify-content:center; font-size:10px; color:#666;">
                        🖱 Клик → разместить | 🗑 Delete | 🔄 Поворот | 📐 Сетка | 🏠 Фон
                    </div>
                    <div class="row" style="justify-content:center; font-size:10px; color:#666;">
                        🖱 Колёсико масштаб | 📌 Ctrl+клик слой | 📄 PageUp/PageDown | 🔒 L/U закрепить
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="editor-error">
        ❌ Ошибка загрузки редактора комнаты<br>
        Проверьте консоль (F12)
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <script type="module" src="/src/game.js"></script>
    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const panel = document.getElementById('furniture-panel');
        const toggleBtn = document.getElementById('furniture-toggle');
        const snapToggle = document.getElementById('snap-toggle');
        const deleteBtn = document.getElementById('delete-selected');
        const lockBtn = document.getElementById('lock-selected');
        const unlockBtn = document.getElementById('unlock-selected');
        const newRoomBtn = document.getElementById('new-room-btn');
        const bgSelect = document.getElementById('bg-select');
        const uploadBgBtn = document.getElementById('upload-bg-btn');
        const viewTasksBtn = document.getElementById('view-tasks-btn');
        
        if (toggleBtn) {
            toggleBtn.onclick = () => {
                const isOpen = panel.getAttribute('data-open') === 'true';
                panel.setAttribute('data-open', isOpen ? 'false' : 'true');
                toggleBtn.textContent = isOpen ? '⟩' : '⟨';
            };
        }
        
        function getEditorScene() {
            return window.homespaceGame?.scene?.getScene('EditorScene');
        }
        
        if (snapToggle) {
            snapToggle.onclick = () => {
                const scene = getEditorScene();
                if (scene) scene.toggleSnap();
            };
        }
        
        if (deleteBtn) {
            deleteBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene) scene.deleteSelected();
            };
        }
        
        if (lockBtn) {
            lockBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene) scene.lockSelected();
            };
        }
        
        if (unlockBtn) {
            unlockBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene) scene.unlockSelected();
            };
        }
        
        if (newRoomBtn) {
            newRoomBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene) scene.createNewRoom();
            };
        }
        
        if (bgSelect) {
            bgSelect.onchange = () => {
                const scene = getEditorScene();
                if (scene) scene.changeBackground(bgSelect.value);
            };
        }
        
        if (uploadBgBtn) {
            uploadBgBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene) scene.uploadBackground();
            };
        }
        
        if (viewTasksBtn) {
            viewTasksBtn.onclick = () => {
                window.open('/tasks.html', '_blank');
            };
        }
    });
    
    window.addEventListener('error', (e) => {
        console.error('Global error:', e.error);
        const errorDiv = document.getElementById('editor-error');
        if (errorDiv) {
            errorDiv.style.display = 'flex';
            errorDiv.innerHTML = `❌ Ошибка: ${e.message}<br>Проверьте консоль (F12)`;
        }
    });
    
    window.getEditorScene = () => {
        return window.homespaceGame?.scene?.getScene('EditorScene');
    };
</script>
</body>
</html>
