<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HomeSpace - Редактор комнаты</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(78, 204, 163, 0.15) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        #game-container {
            width: 1280px;
            height: 800px;
            position: relative;
            z-index: 10;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        .back-to-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(78, 204, 163, 0.5);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .back-to-menu:hover {
            background: rgba(78, 204, 163, 0.3);
            border-color: #4ecca3;
            transform: translateX(-3px);
        }

        #ui-root {
            position: absolute;
            inset: 0;
            pointer-events: none !important;
            z-index: 200;
        }
        
        #ui-root * {
            pointer-events: auto !important;
        }

        .panel {
            position: absolute;
            top: 18px;
            left: 18px;
            width: 360px;
            max-height: calc(100% - 36px);
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(78, 204, 163, 0.55);
            border-radius: 18px;
            overflow-y: auto;
            box-shadow: 0 18px 40px rgba(0,0,0,0.35);
            transition: width 0.3s ease;
        }

        .panel[data-open="false"] {
            width: 64px;
        }

        .panel[data-open="false"] .panel__title,
        .panel[data-open="false"] .panel__body {
            display: none;
        }

        .panel__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 12px 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            background: rgba(15, 15, 26, 0.95);
        }

        .panel__title {
            font-weight: 800;
            letter-spacing: 0.3px;
            font-size: 16px;
        }

        .icon-btn {
            appearance: none;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(44, 62, 80, 0.7);
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
        }

        .icon-btn:hover {
            border-color: rgba(78, 204, 163, 0.7);
        }

        .panel__body {
            padding: 12px 12px 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .label {
            font-size: 12px;
            color: rgba(255,255,255,0.75);
            padding: 0 2px;
        }

        .select {
            flex: 1;
            min-width: 120px;
            padding: 8px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(22, 33, 62, 0.65);
            color: #fff;
            outline: none;
            cursor: pointer;
        }

        .select:focus {
            border-color: rgba(78, 204, 163, 0.75);
        }

        .input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(22, 33, 62, 0.65);
            color: #fff;
            outline: none;
        }

        .input::placeholder {
            color: rgba(255,255,255,0.55);
        }

        .input:focus {
            border-color: rgba(78, 204, 163, 0.75);
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(44, 62, 80, 0.55);
            color: #fff;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chip:hover {
            border-color: rgba(78, 204, 163, 0.55);
        }

        .chip[aria-selected="true"] {
            border-color: rgba(78, 204, 163, 0.85);
            background: rgba(78, 204, 163, 0.18);
        }

        .chip--danger {
            border-color: rgba(233, 69, 96, 0.55);
            background: rgba(233, 69, 96, 0.18);
        }

        .furniture-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            max-height: 280px;
            padding-right: 4px;
        }

        .furniture-item {
            display: grid;
            grid-template-columns: 38px 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 8px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(35, 41, 49, 0.55);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .furniture-item:hover {
            border-color: rgba(78, 204, 163, 0.55);
            transform: translateX(5px);
        }

        .furniture-emoji {
            font-size: 22px;
            text-align: center;
        }

        .furniture-name {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.1;
        }

        .furniture-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 150px;
            overflow-y: auto;
        }

        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(35, 41, 49, 0.55);
            border-radius: 10px;
            cursor: pointer;
        }

        .room-item.active {
            border: 1px solid #4ecca3;
            background: rgba(78, 204, 163, 0.2);
        }

        .room-item:hover {
            background: rgba(78, 204, 163, 0.3);
        }

        .room-select-btn, .room-delete-btn {
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(78,204,163,0.2);
            border: 1px solid #4ecca3;
            color: white;
            margin-left: 5px;
        }

        .room-delete-btn {
            border-color: #e94560;
            color: #e94560;
        }

        .dev-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .dev-controls button {
            background: rgba(0,0,0,0.6);
            border: 1px solid #4ecca3;
            padding: 5px 10px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        #editor-error {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #e94560;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            z-index: 10000;
            font-size: 14px;
        }

        /* ========== СТИЛЬНОЕ МОДАЛЬНОЕ ОКНО ========== */
        #task-modal-editor {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        
        #task-modal-editor.active {
            display: flex !important;
            animation: modalFadeIn 0.2s ease-out;
        }
        
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        #task-modal-editor .modal-content {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.98), rgba(22, 33, 62, 0.98));
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 32px;
            max-width: 520px;
            width: 90%;
            border: 1px solid rgba(78, 204, 163, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        #task-modal-editor .modal-content h3 {
            color: #4ecca3;
            margin-bottom: 24px;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
        }
        
        #task-modal-editor .modal-content input,
        #task-modal-editor .modal-content textarea,
        #task-modal-editor .modal-content select {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: rgba(15, 25, 35, 0.9);
            border: 1px solid rgba(78, 204, 163, 0.3);
            border-radius: 14px;
            color: #ffffff !important;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }
        
        #task-modal-editor .modal-content input:focus,
        #task-modal-editor .modal-content textarea:focus,
        #task-modal-editor .modal-content select:focus {
            outline: none;
            border-color: #4ecca3;
            box-shadow: 0 0 0 3px rgba(78, 204, 163, 0.2);
        }
        
        #task-modal-editor .modal-content input::placeholder,
        #task-modal-editor .modal-content textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        #task-modal-editor .modal-content textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        #task-modal-editor .modal-content select {
            cursor: pointer;
            background: rgba(15, 25, 35, 0.9);
            color: #ffffff;
        }
        
        #task-modal-editor .modal-content select option {
            background: #1a1a2e;
            color: #ffffff;
        }
        
        /* Бонус контрол */
        #task-modal-editor .bonus-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: rgba(15, 25, 35, 0.6);
            padding: 8px 16px;
            border-radius: 60px;
        }
        
        #task-modal-editor .bonus-control span {
            color: #ffd700;
            font-weight: 600;
            font-size: 15px;
        }
        
        #task-modal-editor .bonus-control input {
            flex: 1;
            margin-bottom: 0;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.5);
        }
        
        #task-modal-editor .bonus-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(78, 204, 163, 0.15);
            border: 1px solid #4ecca3;
            color: #4ecca3;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        #task-modal-editor .bonus-btn:hover {
            background: rgba(78, 204, 163, 0.3);
            transform: scale(1.05);
        }
        
        /* Метка назначения */
        #task-assigned-container label {
            color: rgba(255, 255, 255, 0.8);
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Блок с принудительным назначением */
        #task-assigned-container > div {
            background: rgba(78, 204, 163, 0.12);
            border: 1px solid rgba(78, 204, 163, 0.35);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #task-assigned-container > div strong {
            color: #4ecca3;
            font-size: 16px;
        }
        
        /* Кнопки модального окна */
        #task-modal-editor .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        
        #task-modal-editor .modal-cancel {
            padding: 12px 28px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        #task-modal-editor .modal-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        #task-modal-editor .modal-save {
            padding: 12px 32px;
            border-radius: 40px;
            background: linear-gradient(135deg, #4ecca3, #2c8f6e);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        #task-modal-editor .modal-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 204, 163, 0.4);
        }

        @media (max-width: 768px) {
            .panel {
                left: 10px;
                top: 10px;
                width: calc(100% - 20px);
                max-width: 360px;
                max-height: calc(100% - 20px);
            }
            .furniture-list {
                max-height: 200px;
            }
            .dev-controls {
                display: none;
            }
            #task-modal-editor .modal-content {
                padding: 24px;
                width: 92%;
            }
            #task-modal-editor .modal-content h3 {
                font-size: 22px;
            }
            #task-modal-editor .modal-cancel,
            #task-modal-editor .modal-save {
                padding: 10px 20px;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <a href="/" class="back-to-menu">
        ← Назад в меню
    </a>

    <div id="game-container">
        <div id="game"></div>
        <div id="ui-root">
            <aside id="furniture-panel" class="panel" data-open="true">
                <div class="panel__header">
                    <div class="panel__title">🪑 Мебель</div>
                    <button id="furniture-toggle" class="icon-btn" type="button">⟨</button>
                </div>
                <div class="panel__body">
                    <div class="row">
                        <button id="snap-toggle" class="chip" type="button">📐 Сетка: выкл</button>
                        <button id="delete-selected" class="chip chip--danger" type="button">🗑 Удалить</button>
                        <button id="lock-selected" class="chip" type="button">🔒 Закрепить</button>
                        <button id="unlock-selected" class="chip" type="button">🔓 Разблок.</button>
                        <button id="view-tasks-btn" class="chip" type="button">📋 Задания</button>
                    </div>
                    
                    <div class="row">
                        <label class="label">🏠 Мои комнаты</label>
                    </div>
                    <div id="rooms-list" class="rooms-list"></div>
                    <div class="row">
                        <button id="new-room-btn" class="chip" style="width:100%;">➕ Новая комната</button>
                    </div>
                    
                    <div class="row">
                        <label class="label">🎨 Фон</label>
                        <select id="bg-select" class="select"></select>
                        <button id="upload-bg-btn" class="chip">📷 Своё</button>
                    </div>
                    
                    <div class="row">
                        <input id="furniture-search" class="input" type="search" placeholder="🔍 Поиск мебели..." />
                    </div>
                    
                    <div id="furniture-categories" class="chips" role="tablist">
                        <button class="chip" data-category="all" aria-selected="true">📦 Все</button>
                        <button class="chip" data-category="base">🧱 Стены</button>
                        <button class="chip" data-category="bathroom">🚿 Ванная</button>
                        <button class="chip" data-category="bedroom">🛏 Спальня</button>
                        <button class="chip" data-category="kitchen">🍳 Кухня</button>
                        <button class="chip" data-category="livingroom">🛋 Гостиная</button>
                        <button class="chip" data-category="decor">🎨 Декор</button>
                        <button class="chip" data-category="electronics">📱 Электроника</button>
                        <button class="chip" data-category="rooms">🏠 Комнаты</button>
                    </div>
                    
                    <div id="furniture-list" class="furniture-list">
                        <div style="text-align:center;padding:20px;">📦 Загрузка...</div>
                    </div>
                    
                    <div class="row" style="justify-content:center; font-size:10px; color:#666;">
                        🖱 Клик → разместить | 🗑 Delete | 🔄 Поворот | 📐 Сетка | 🏠 Фон
                    </div>
                    <div class="row" style="justify-content:center; font-size:10px; color:#666;">
                        🖱 Колёсико масштаб | 📌 Ctrl+клик слой | 📄 PageUp/PageDown | 🔒 L/U закрепить
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div class="dev-controls">
        <button id="debug-outline-btn">🐛 Debug</button>
        <button id="toggle-panel-btn">📁 Скрыть панель</button>
    </div>

    <div id="editor-error">
        ❌ Ошибка загрузки редактора комнаты<br>
        Проверьте консоль (F12)
    </div>

    <!-- СТИЛЬНОЕ МОДАЛЬНОЕ ОКНО СОЗДАНИЯ ЗАДАНИЯ -->
    <div id="task-modal-editor">
        <div class="modal-content">
            <h3>✨ Создать задание</h3>
            <input type="text" id="task-title-editor" placeholder="Название задания" autocomplete="off">
            <textarea id="task-desc-editor" placeholder="Описание задания..."></textarea>
            <div class="bonus-control">
                <span>💰 Бонус:</span>
                <button class="bonus-btn" id="bonus-minus-editor">−</button>
                <input type="number" id="task-bonus-editor" value="10" min="1" max="100">
                <button class="bonus-btn" id="bonus-plus-editor">+</button>
            </div>
            <div id="task-assigned-container"></div>
            <div class="modal-buttons">
                <button class="modal-cancel" id="task-cancel-editor">Отмена</button>
                <button class="modal-save" id="task-save-editor">Создать</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <script type="module" src="/src/game.js"></script>
    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const panel = document.getElementById('furniture-panel');
        const toggleBtn = document.getElementById('furniture-toggle');
        const togglePanelBtn = document.getElementById('toggle-panel-btn');
        const debugBtn = document.getElementById('debug-outline-btn');
        const snapToggle = document.getElementById('snap-toggle');
        const deleteBtn = document.getElementById('delete-selected');
        const lockBtn = document.getElementById('lock-selected');
        const unlockBtn = document.getElementById('unlock-selected');
        const newRoomBtn = document.getElementById('new-room-btn');
        const bgSelect = document.getElementById('bg-select');
        const uploadBgBtn = document.getElementById('upload-bg-btn');
        const viewTasksBtn = document.getElementById('view-tasks-btn');
        
        // Сворачивание панели мебели
        if (toggleBtn) {
            toggleBtn.onclick = () => {
                const isOpen = panel.getAttribute('data-open') === 'true';
                panel.setAttribute('data-open', isOpen ? 'false' : 'true');
                toggleBtn.textContent = isOpen ? '⟩' : '⟨';
                console.log('Панель мебели:', isOpen ? 'свернута' : 'развернута');
            };
        }
        
        if (togglePanelBtn) {
            togglePanelBtn.onclick = () => {
                const hidden = panel.style.display === 'none';
                panel.style.display = hidden ? 'block' : 'none';
                togglePanelBtn.textContent = hidden ? '📂 Показать панель' : '📁 Скрыть панель';
            };
        }
        
        if (debugBtn) {
            debugBtn.onclick = () => {
                document.getElementById('game-container').classList.toggle('debug-outline');
            };
        }
        
        function getEditorScene() {
            if (window.homespaceGame?.scene) {
                return window.homespaceGame.scene.getScene('EditorScene');
            }
            return null;
        }
        
        if (snapToggle) {
            snapToggle.onclick = () => {
                const scene = getEditorScene();
                if (scene && scene.toggleSnap) scene.toggleSnap();
            };
        }
        
        if (deleteBtn) {
            deleteBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene && scene.deleteSelected) scene.deleteSelected();
            };
        }
        
        if (lockBtn) {
            lockBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene && scene.lockSelected) scene.lockSelected();
            };
        }
        
        if (unlockBtn) {
            unlockBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene && scene.unlockSelected) scene.unlockSelected();
            };
        }
        
        if (newRoomBtn) {
            newRoomBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene && scene.createNewRoom) scene.createNewRoom();
            };
        }
        
        if (bgSelect) {
            bgSelect.onchange = () => {
                const scene = getEditorScene();
                if (scene && scene.changeBackground) scene.changeBackground(bgSelect.value);
            };
        }
        
        if (uploadBgBtn) {
            uploadBgBtn.onclick = () => {
                const scene = getEditorScene();
                if (scene && scene.uploadBackground) scene.uploadBackground();
            };
        }
        
        if (viewTasksBtn) {
            viewTasksBtn.onclick = () => {
                window.open('/tasks.html', '_blank');
            };
        }
    });
    
    window.addEventListener('error', (e) => {
        console.error('Global error:', e.error);
        const errorDiv = document.getElementById('editor-error');
        if (errorDiv) {
            errorDiv.style.display = 'flex';
            errorDiv.innerHTML = `❌ Ошибка: ${e.message}<br>Проверьте консоль (F12)`;
        }
    });
    
    window.getEditorScene = () => {
        if (window.homespaceGame?.scene) {
            return window.homespaceGame.scene.getScene('EditorScene');
        }
        return null;
    };
</script>
</body>
</html>
