<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HomeSpace - Задания</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(78, 204, 163, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Кнопка назад */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(78, 204, 163, 0.5);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(78, 204, 163, 0.3);
            border-color: #4ecca3;
            transform: translateX(-3px);
        }

        /* Заголовок */
        .header {
            text-align: center;
            padding: 40px 0 30px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #4ecca3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
        }

        /* Панель статистики */
        .stats-panel {
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(78, 204, 163, 0.3);
        }

        .stat-card {
            text-align: center;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            min-width: 120px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #ffd700;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        /* Фильтры */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-row { display:flex; justify-content:center; margin-bottom: 15px; }
        .search-input { width:min(560px, 100%); padding:10px 14px; border-radius: 12px; border:1px solid rgba(78,204,163,.4); background: rgba(0,0,0,.35); color:#fff; }
        .subtasks { margin-top:8px; display:flex; flex-direction:column; gap:4px; }
        .subtask-item { font-size:12px; color:#ddd; }

        .filter-btn {
            background: rgba(44, 62, 80, 0.8);
            border: 1px solid rgba(78, 204, 163, 0.3);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #4ecca3, #3ba87f);
            border-color: transparent;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
        }

        /* Кнопка создания задания */
        .create-task-btn {
            background: linear-gradient(135deg, #0865fa, #07488d);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .create-task-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(8, 101, 250, 0.4);
        }

        /* Список заданий */
        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-card {
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(78, 204, 163, 0.2);
            transition: all 0.2s ease;
        }

        .task-card.completed {
            border-color: #4ecca3;
            background: rgba(78, 204, 163, 0.1);
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-status {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
        }

        .task-status.completed {
            background: rgba(78, 204, 163, 0.2);
            color: #4ecca3;
        }

        .task-description {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .task-meta {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .task-bonus {
            background: rgba(255, 215, 0, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            color: #ffd700;
            font-weight: 600;
        }

        .task-assigned {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .complete-btn {
            background: linear-gradient(135deg, #4ecca3, #3ba87f);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .complete-btn:hover {
            transform: scale(1.05);
        }

        .delete-btn {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            padding: 8px 20px;
            border-radius: 30px;
            color: #e94560;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: rgba(233, 69, 96, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(15, 15, 26, 0.6);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(78, 204, 163, 0.5);
        }

        .modal-content h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background: rgba(44, 62, 80, 0.8);
            border: 1px solid rgba(78, 204, 163, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .modal-content textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-content input:focus,
        .modal-content textarea:focus,
        .modal-content select:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .bonus-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .bonus-control input {
            flex: 1;
            margin-bottom: 0;
            text-align: center;
        }

        .bonus-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid #4ecca3;
            color: #4ecca3;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }

        .modal-save {
            background: #4ecca3;
            border: none;
            color: white;
        }

        .modal-cancel {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            color: #e94560;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header h1 {
                font-size: 32px;
            }
            .task-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .task-actions {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
 <div style="display: flex; gap: 10px; position: fixed; top: 20px; left: 20px; z-index: 100;">
        <button class="back-btn" id="close-btn" style="background: rgba(233, 69, 96, 0.8); border-color: #e94560; position: relative; top: 0; left: 0;">
            ✕ Закрыть
        </button>
        <button class="back-btn" id="menu-btn" onclick="window.location.href='/'">
            ← Назад в меню
        </button>
    </div>
    <div class="container">
        <div class="header">
            <h1>Управление заданиями</h1>
            <p>Создавайте, выполняйте и зарабатывайте бонусы!</p>
        </div>

        <div class="stats-panel" id="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="total-tasks">0</div>
                <div class="stat-label">Всего заданий</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completed-tasks">0</div>
                <div class="stat-label">Выполнено</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pending-tasks">0</div>
                <div class="stat-label">В ожидании</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="my-tasks">0</div>
                <div class="stat-label">Мои задания</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-bonuses">0</div>
                <div class="stat-label">Заработано</div>
            </div>
        </div>

        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="my">Мои задания</button>
            <button class="filter-btn" data-filter="pending">В ожидании</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>
        <div class="search-row">
            <input id="tasks-search" class="search-input" type="text" placeholder="Поиск по заданиям...">
        </div>

        <div style="text-align: center;">
            <button class="create-task-btn" id="create-task-btn">
                Создать задание
            </button>
        </div>

        <div class="tasks-list" id="tasks-list">
            <div class="empty-state">
                <div class="empty-state-icon">Список</div>
                <div>Загрузка заданий...</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания задания -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <h3>Создать задание</h3>
            <input type="text" id="task-title" placeholder="Название задания" autocomplete="off">
            <textarea id="task-description" placeholder="Описание (необязательно)"></textarea>
            <div class="bonus-control">
                <span style="color:white;">Бонус:</span>
                <button class="bonus-btn" id="bonus-minus">-</button>
                <input type="number" id="task-bonus" value="10" min="1" max="100">
                <button class="bonus-btn" id="bonus-plus">+</button>
            </div>
            <select id="task-assigned">
                <option value="">— Не назначено —</option>
            </select>
            <input type="text" id="task-item" placeholder="Привязать к предмету (ключ, опционально)">
            <div class="modal-buttons">
                <button class="modal-cancel" id="modal-cancel">Отмена</button>
                <button class="modal-save" id="modal-save">Создать</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';
        let token = localStorage.getItem('homespace_token');
        let currentUser = null;
        let tasks = [];
        let familyMembers = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let subtasksStore = {};
                function closeWebView() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('close-webview', '*');
            } else {
                window.location.href = '/';
            }
        }

        // Настройка кнопки закрытия после загрузки DOM
        document.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.getElementById('close-btn');
            if (closeBtn) {
                closeBtn.onclick = closeWebView;
            }
        });
    // Адаптация к размеру окна в WebView
        function handleResize() {
        // Если мы внутри iframe, сообщаем родителю о готовности
        if (window.parent && window.parent !== window) {
            // Сообщаем, что страница загружена
            window.parent.postMessage('ready', '*');
        }
        
        // Адаптируем контейнер под размер iframe
        const container = document.querySelector('.container');
        if (container && window.innerWidth < 768) {
            container.style.padding = '15px';
        }
    }
    
    // Слушаем сообщения от родителя
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'resize') {
            // Обновляем размеры при необходимости
            document.body.style.margin = '0';
            document.body.style.padding = '0';
        }
    });
    
    // Запускаем при загрузке
    window.addEventListener('load', handleResize);
    window.addEventListener('resize', handleResize);
    handleResize();
        // Инициализация
        async function init() {
            try { subtasksStore = JSON.parse(localStorage.getItem('homespace_subtasks') || '{}'); } catch { subtasksStore = {}; }
            await loadCurrentUser();
            if (!token || !currentUser) {
                window.location.href = '/';
                return;
            }
            await loadFamilyMembers();
            await loadTasks();
            setupEventListeners();
        }

        async function loadCurrentUser() {
            const saved = localStorage.getItem('homespace_currentUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    token = localStorage.getItem('homespace_token');
                } catch (e) {
                    console.error('Ошибка загрузки пользователя:', e);
                }
            }
        }

        async function loadFamilyMembers() {
            if (!currentUser?.familyId) return;
            
            try {
                const response = await fetch(`${API_URL}/families/${currentUser.familyId}/members`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    familyMembers = await response.json();
                    updateAssignSelect();
                }
            } catch (error) {
                console.error('Ошибка загрузки членов семьи:', error);
            }
        }

        function updateAssignSelect() {
            const select = document.getElementById('task-assigned');
            if (!select) return;
            
            select.innerHTML = '<option value="">— Не назначено —</option>';
            familyMembers.forEach(member => {
                if (member.id !== currentUser?.id) {
                    const option = document.createElement('option');
                    option.value = member.id;
                    option.textContent = `${member.name} (${member.role === 'parent' ? 'Родитель' : 'Ребёнок'})`;
                    select.appendChild(option);
                }
            });
        }

        async function loadTasks() {
            try {
                let url = `${API_URL}/tasks?`;
                if (currentFilter === 'completed') {
                    url += 'status=completed';
                } else if (currentFilter === 'pending') {
                    url += 'status=pending';
                } else if (currentFilter === 'my' && currentUser) {
                    url += `assignedTo=${currentUser.id}`;
                }
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Ошибка загрузки');
                
                tasks = await response.json();
                renderTasks();
                updateStats();
            } catch (error) {
                console.error('Ошибка загрузки заданий:', error);
                document.getElementById('tasks-list').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">Ошибка</div>
                        <div>Ошибка загрузки заданий</div>
                    </div>
                `;
            }
        }

        function renderTasks() {
            const container = document.getElementById('tasks-list');
            if (!container) return;
            
            let filteredTasks = tasks;
            
            if (currentFilter === 'my' && currentUser) {
                filteredTasks = tasks.filter(t => 
                    t.assigned_to === currentUser.id || t.created_by === currentUser.id
                );
            }
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filteredTasks = filteredTasks.filter(t =>
                    `${t.title || ''} ${t.description || ''}`.toLowerCase().includes(q)
                );
            }
            
            if (!filteredTasks || filteredTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">Список</div>
                        <div>Нет заданий</div>
                        <div style="font-size:12px; margin-top:8px;">Создайте новое задание!</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            
            filteredTasks.forEach(task => {
                const isCompleted = task.status === 'completed';
                const canComplete = task.assigned_to === currentUser?.id || 
                                   !task.assigned_to || 
                                   currentUser?.role === 'parent';
                
                const taskDiv = document.createElement('div');
                taskDiv.className = `task-card ${isCompleted ? 'completed' : ''}`;
                
                taskDiv.innerHTML = `
                    <div class="task-info">
                        <div class="task-title">
                            ${task.title || 'Без названия'}
                            <span class="task-status ${isCompleted ? 'completed' : ''}">
                                ${isCompleted ? 'Выполнено' : 'В ожидании'}
                            </span>
                        </div>
                        ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                        <div class="task-meta">
                            <span class="task-bonus">💰 ${task.bonus || 0} бонусов</span>
                            ${task.item_name ? `<span>${task.item_name}</span>` : ''}
                            <span class="task-assigned">
                                ${task.assigned_to_name || 'Не назначено'}
                            </span>
                            ${task.created_by_name ? `<span>от ${task.created_by_name}</span>` : ''}
                        </div>
                        <div class="subtasks">
                            ${renderSubtasks(task.id)}
                            <div style="display:flex; gap:6px;">
                                <input id="subtask-input-${task.id}" type="text" placeholder="Подзадача..." style="margin:0; padding:4px 8px; font-size:12px; border-radius:8px; border:1px solid rgba(78,204,163,.4); background:rgba(0,0,0,.3); color:#fff;">
                                <button class="complete-btn" style="padding:4px 10px;" data-subtask-add="${task.id}">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="task-actions">
                        ${!isCompleted && canComplete ? `
                            <button class="complete-btn" data-id="${task.id}" data-bonus="${task.bonus}">Выполнить</button>
                        ` : ''}
                        ${currentUser?.role === 'parent' || currentUser?.role === 'admin' ? `
                            <button class="delete-btn" data-id="${task.id}">Удалить</button>
                        ` : ''}
                    </div>
                `;
                
                container.appendChild(taskDiv);
            });
            
            // Добавляем обработчики
            document.querySelectorAll('.complete-btn').forEach(btn => {
                btn.addEventListener('click', () => completeTask(btn.dataset.id, parseInt(btn.dataset.bonus)));
            });
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteTask(btn.dataset.id));
            });
            document.querySelectorAll('[data-subtask-add]').forEach(btn => {
                btn.addEventListener('click', () => addSubtask(btn.dataset.subtaskAdd));
            });
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            const pending = tasks.filter(t => t.status === 'pending').length;
            const myTasks = tasks.filter(t => t.assigned_to === currentUser?.id && t.status !== 'completed').length;
            const totalBonuses = tasks
                .filter(t => t.status === 'completed')
                .reduce((sum, t) => sum + (t.bonus || 0), 0);
            
            document.getElementById('total-tasks').textContent = total;
            document.getElementById('completed-tasks').textContent = completed;
            document.getElementById('pending-tasks').textContent = pending;
            document.getElementById('my-tasks').textContent = myTasks;
            document.getElementById('total-bonuses').textContent = totalBonuses;
            const weekdayCount = [0,0,0,0,0,0,0];
            tasks.filter(t => t.status === 'completed' && t.updated_at).forEach(t => {
                weekdayCount[new Date(t.updated_at).getDay()] += 1;
            });
            const max = Math.max(...weekdayCount);
            const bestDay = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][weekdayCount.indexOf(max)] || '—';
            const myCard = document.getElementById('my-tasks');
            if (myCard?.parentElement) myCard.parentElement.title = `Самый продуктивный день: ${bestDay}`;
        }

        async function completeTask(taskId, bonus) {
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}/complete`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Ошибка выполнения');
                
                const result = await response.json();
                
                alert(`Задание выполнено! +${bonus} бонусов!`);
                
                // Обновляем бонусы пользователя
                if (currentUser) {
                    currentUser.bonuses = (currentUser.bonuses || 0) + bonus;
                    localStorage.setItem('homespace_currentUser', JSON.stringify(currentUser));
                }
                
                await loadTasks();
            } catch (error) {
                console.error('Ошибка выполнения:', error);
                alert('Не удалось выполнить задание');
            }
        }

        async function deleteTask(taskId) {
            if (!confirm('Удалить задание?')) return;
            
            try {
                const response = await fetch(`${API_URL}/tasks/${taskId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Ошибка удаления');
                
                alert('Задание удалено');
                await loadTasks();
            } catch (error) {
                console.error('Ошибка удаления:', error);
                alert('Не удалось удалить задание');
            }
        }

        async function createTask(taskData) {
            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(taskData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Ошибка создания');
                }
                
                alert('Задание создано');
                closeModal();
                await loadTasks();
            } catch (error) {
                console.error('Ошибка создания:', error);
                alert(error.message);
            }
        }

        function showCreateModal() {
            const modal = document.getElementById('task-modal');
            modal.classList.add('active');
            
            // Сброс полей
            document.getElementById('task-title').value = '';
            document.getElementById('task-description').value = '';
            document.getElementById('task-bonus').value = '10';
            document.getElementById('task-assigned').value = '';
            document.getElementById('task-item').value = '';
        }

        function closeModal() {
            const modal = document.getElementById('task-modal');
            modal.classList.remove('active');
        }

        function setupEventListeners() {
            // Фильтры
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    loadTasks();
                });
            });
            
            // Создание задания
            document.getElementById('create-task-btn').onclick = showCreateModal;
            document.getElementById('modal-cancel').onclick = closeModal;
            document.getElementById('modal-save').onclick = () => {
                const title = document.getElementById('task-title').value.trim();
                if (!title) {
                    alert('Введите название задания');
                    return;
                }
                
                createTask({
                    title: title,
                    description: document.getElementById('task-description').value,
                    bonus: parseInt(document.getElementById('task-bonus').value) || 10,
                    assignedTo: document.getElementById('task-assigned').value || null,
                    itemKey: document.getElementById('task-item').value || null
                });
            };
            
            // Управление бонусом
            document.getElementById('bonus-minus').onclick = () => {
                const input = document.getElementById('task-bonus');
                let val = parseInt(input.value) || 10;
                if (val > 1) input.value = val - 1;
            };
            document.getElementById('bonus-plus').onclick = () => {
                const input = document.getElementById('task-bonus');
                let val = parseInt(input.value) || 10;
                input.value = val + 1;
            };
            
            // Закрытие по клику вне модалки
            document.getElementById('task-modal').onclick = (e) => {
                if (e.target === document.getElementById('task-modal')) {
                    closeModal();
                }
            };
            const searchInput = document.getElementById('tasks-search');
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    searchQuery = searchInput.value.trim();
                    renderTasks();
                });
            }
        }

        function renderSubtasks(taskId) {
            const items = subtasksStore[taskId] || [];
            if (!items.length) return '<div class="subtask-item">Подзадач нет</div>';
            return items.map((s, i) => `<label class="subtask-item"><input type="checkbox" ${s.done ? 'checked' : ''} onchange="toggleSubtask('${taskId}', ${i})"> ${escapeHtml(s.text)}</label>`).join('');
        }

        function addSubtask(taskId) {
            const input = document.getElementById(`subtask-input-${taskId}`);
            const text = input?.value?.trim();
            if (!text) return;
            if (!subtasksStore[taskId]) subtasksStore[taskId] = [];
            subtasksStore[taskId].push({ text, done: false });
            localStorage.setItem('homespace_subtasks', JSON.stringify(subtasksStore));
            renderTasks();
        }

        window.toggleSubtask = function(taskId, index) {
            const list = subtasksStore[taskId] || [];
            if (!list[index]) return;
            list[index].done = !list[index].done;
            localStorage.setItem('homespace_subtasks', JSON.stringify(subtasksStore));
            renderTasks();
        };

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        

        // Запуск
        init();
    </script>
</body>
</html>
