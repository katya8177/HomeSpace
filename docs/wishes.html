<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HomeSpace - Магазин желаний</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            position: relative;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(78, 204, 163, 0.15) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            animation: pulse 12s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Кнопка назад */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(78, 204, 163, 0.5);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(78, 204, 163, 0.3);
            border-color: #4ecca3;
            transform: translateX(-3px);
        }

        /* Заголовок */
        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #4ecca3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
        }

        /* Панель бонусов */
        .bonus-panel {
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(78,204,163,0.1));
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4ecca3, #ffd700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.3);
        }

        .user-details h3 {
            color: white;
            font-size: 18px;
        }

        .user-details p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 4px;
        }

        .bonus-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 10px 25px;
            text-align: center;
            border: 1px solid #ffd700;
        }

        .bonus-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .bonus-value {
            font-size: 36px;
            font-weight: 800;
            color: #ffd700;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: rgba(44, 62, 80, 0.8);
            border: 1px solid rgba(78, 204, 163, 0.3);
            padding: 12px 30px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 500;
        }

        .tab-btn:hover {
            border-color: rgba(78, 204, 163, 0.7);
            background: rgba(78, 204, 163, 0.1);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #4ecca3, #3ba87f);
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(78,204,163,0.4);
        }

        /* Кнопка создания */
        .create-wish-btn {
            background: linear-gradient(135deg, #ffd700, #e6b800);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .create-wish-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        /* Список желаний */
        .wishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .wish-card {
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 2px solid transparent;
            background-clip: padding-box;
            background-image: linear-gradient(rgba(15, 15, 26, 0.9), rgba(15, 15, 26, 0.9)), linear-gradient(135deg, #4ecca3, #ffd700);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .wish-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(78,204,163,0.1), transparent);
            pointer-events: none;
            border-radius: 22px;
        }

        .wish-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: transparent;
            box-shadow: 0 12px 40px rgba(78,204,163,0.4), 0 0 30px rgba(78,204,163,0.2);
        }

        .wish-card.pending {
            border-left: 4px solid #ffd700;
        }

        .wish-card.purchased {
            opacity: 0.7;
            border-left: 4px solid #4ecca3;
        }

        .wish-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .wish-title {
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .wish-description {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .wish-image img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .wish-link { margin: 8px 0; }
        .wish-link a { color: #4ecca3; text-decoration: none; }
        .wish-comments { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .comment-row { font-size: 12px; color: #ddd; margin-bottom: 6px; }

        .wish-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .wish-price {
            background: rgba(255, 215, 0, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            color: #ffd700;
            font-weight: 700;
            font-size: 18px;
        }

        .wish-creator {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .wish-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
        }

        .wish-status.approved {
            background: rgba(78, 204, 163, 0.2);
            color: #4ecca3;
        }

        .wish-status.pending {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .wish-status.purchased {
            background: rgba(78, 204, 163, 0.1);
            color: #4ecca3;
        }

        .wish-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .buy-btn {
            flex: 1;
            background: linear-gradient(135deg, #4ecca3, #3ba87f);
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(78,204,163,0.3);
        }

        .buy-btn:hover:not(.disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(78,204,163,0.5);
            background: linear-gradient(135deg, #5dd8b1, #4ecca3);
        }

        .approve-btn {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid #4ecca3;
            padding: 8px 15px;
            border-radius: 30px;
            color: #4ecca3;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .approve-btn:hover {
            background: rgba(78, 204, 163, 0.3);
            box-shadow: 0 4px 12px rgba(78,204,163,0.3);
            transform: translateY(-1px);
        }

        .reject-btn {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            padding: 8px 15px;
            border-radius: 30px;
            color: #e94560;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reject-btn:hover {
            background: rgba(233, 69, 96, 0.3);
            box-shadow: 0 4px 12px rgba(233,69,96,0.3);
            transform: translateY(-1px);
        }

        .price-input {
            background: rgba(0,0,0,0.5);
            border: 1px solid #ffd700;
            border-radius: 30px;
            padding: 8px 12px;
            color: #ffd700;
            width: 80px;
            text-align: center;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(78, 204, 163, 0.5);
        }

        .modal-content h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background: rgba(44, 62, 80, 0.8);
            border: 1px solid rgba(78, 204, 163, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .modal-content textarea {
            resize: vertical;
            min-height: 80px;
        }

        .icons-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .icon-option {
            font-size: 32px;
            padding: 8px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .icon-option.selected {
            background: rgba(78, 204, 163, 0.3);
            transform: scale(1.1);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-save {
            background: #4ecca3;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .modal-cancel {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            padding: 10px 25px;
            border-radius: 30px;
            color: #e94560;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(15, 15, 26, 0.6);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header h1 {
                font-size: 32px;
            }
            .bonus-panel {
                flex-direction: column;
                text-align: center;
            }
            .wishes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div style="display: flex; gap: 10px; position: fixed; top: 20px; left: 20px; z-index: 100;">
        <button class="back-btn" id="menu-btn" onclick="window.location.href='/'">
            ← Назад в меню
        </button>
    </div>

    <div class="container">
        <div class="header">
            <h1>Магазин желаний</h1>
            <p>Копи бонусы и исполняй свои мечты!</p>
        </div>

        <div class="bonus-panel" id="bonus-panel">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar"></div>
                <div class="user-details">
                    <h3 id="user-name">Загрузка...</h3>
                    <p id="user-role"></p>
                </div>
            </div>
            <div class="bonus-card">
                <div class="bonus-label">Мои бонусы</div>
                <div class="bonus-value" id="user-bonuses">0</div>
            </div>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab-btn active" data-tab="shop">Доступные</button>
            <button class="tab-btn" data-tab="create">✨ Новое желание</button>
            <button class="tab-btn" data-tab="history">История</button>
        </div>

        <div style="text-align: center;" id="admin-tab-container"></div>

        <div id="content-container"></div>
    </div>

    <!-- Модальное окно одобрения -->
    <div class="modal" id="approve-modal">
        <div class="modal-content">
            <h3>✅ Одобрить желание</h3>
            <input type="number" id="approve-price" placeholder="Цена в бонусах" value="50">
            <div class="modal-buttons">
                <button class="modal-cancel" id="approve-cancel">Отмена</button>
                <button class="modal-save" id="approve-confirm">Одобрить</button>
            </div>
        </div>
    </div>

    <!-- Кроппер для картинок желаний -->
    <div class="modal" id="cropper-modal">
        <div class="modal-content" style="max-width: 440px;">
            <h3>Обрезка картинки</h3>
            <div style="display:flex; justify-content:center;">
                <canvas id="cropper-canvas" width="280" height="280" style="width: 280px; height: 280px; border-radius: 22px; background: rgba(0,0,0,0.25); border: 1px solid rgba(78, 204, 163, 0.25); touch-action: none;"></canvas>
            </div>
            <div style="margin-top: 16px;">
                <label style="display:block; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; margin-bottom: 8px;">Масштаб</label>
                <input id="cropper-zoom" type="range" min="1" max="3" step="0.01" value="1" style="width: 100%;">
            </div>
            <div class="modal-buttons" style="margin-top: 18px;">
                <button class="modal-cancel" id="cropper-cancel">Отмена</button>
                <button class="modal-save" id="cropper-apply">Готово</button>
            </div>
        </div>
    </div>

    <script>
        let cropperState = null;
        const API_URL = 'http://localhost:3001/api';
        let token = localStorage.getItem('homespace_token');
        let currentUser = null;
        let wishes = [];
        let currentTab = 'shop';
        let selectedIcon = '🎮';
        let pendingApproveWish = null;
        let localWishExtras = {};

        function closeWebView() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage('close-webview', '*');
            } else {
                window.location.href = '/';
            }
        }

        // Настройка кнопки закрытия после загрузки DOM
        document.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.getElementById('close-btn');
            if (closeBtn) {
                closeBtn.onclick = closeWebView;
            }
        });
        // Адаптация к размеру окна в WebView
    function handleResize() {
        // Если мы внутри iframe, сообщаем родителю о готовности
        if (window.parent && window.parent !== window) {
            // Сообщаем, что страница загружена
            window.parent.postMessage('ready', '*');
        }
        
        // Адаптируем контейнер под размер iframe
        const container = document.querySelector('.container');
        if (container && window.innerWidth < 768) {
            container.style.padding = '15px';
        }
    }
    
    // Слушаем сообщения от родителя
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'resize') {
            // Обновляем размеры при необходимости
            document.body.style.margin = '0';
            document.body.style.padding = '0';
        }
    });
    
    // Запускаем при загрузке
    window.addEventListener('load', handleResize);
    window.addEventListener('resize', handleResize);
    handleResize();

        // Инициализация
        async function init() {
            try { localWishExtras = JSON.parse(localStorage.getItem('homespace_wish_extras') || '{}'); } catch { localWishExtras = {}; }
            await loadCurrentUser();
            if (!token || !currentUser) {
                window.location.href = '/';
                return;
            }
            setupEventListeners();
            await loadWishes();
        }

async function loadCurrentUser() {
    const saved = localStorage.getItem('homespace_currentUser');
    if (saved) {
        try {
            currentUser = JSON.parse(saved);
            token = localStorage.getItem('homespace_token');
            
            document.getElementById('user-name').textContent = currentUser.name || 'Пользователь';
            document.getElementById('user-avatar').innerHTML = getAvatarHtml(currentUser.avatar, currentUser.name);
            document.getElementById('user-bonuses').textContent = currentUser.bonuses || 0;
            
            // Правильное отображение роли
            let roleText = '';
            if (currentUser.role === 'parent') roleText = 'Родитель';
            else if (currentUser.role === 'user') roleText = 'Обычный пользователь';
            else roleText = 'Ребёнок';
            document.getElementById('user-role').textContent = roleText;
            
            // Вкладка "На одобрении" ТОЛЬКО для родителя, у которого есть семья
            if (currentUser.role === 'parent' && currentUser.familyId) {
                const adminTab = document.createElement('button');
                adminTab.className = 'tab-btn';
                adminTab.dataset.tab = 'pending';
                adminTab.textContent = '⏳ На одобрении';
                document.getElementById('admin-tab-container').appendChild(adminTab);
                
                adminTab.addEventListener('click', () => {
                    setActiveTab('pending');
                    loadWishes();
                    renderContent();
                });
            }
        } catch (e) {
            console.error('Ошибка загрузки пользователя:', e);
        }
    }
}

async function loadWishes() {
    try {
        let url = `${API_URL}/wishes?`;
        if (currentTab === 'shop') {
            url += 'status=approved';
        } else if (currentTab === 'pending') {
            url += 'status=pending';
        } else if (currentTab === 'history') {
            url += 'status=purchased';
        }
        
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) throw new Error('Ошибка загрузки');
        
        wishes = await response.json();
        renderContent();
    } catch (error) {
        console.error('Ошибка загрузки желаний:', error);
        // ...
    }
}

function renderContent() {
    const container = document.getElementById('content-container');
    
    if (currentTab === 'create') {
        renderCreateForm(container);
        return;
    }
    
    let filteredWishes = [];
    if (currentTab === 'shop') {
        filteredWishes = wishes.filter(w => w.status === 'approved' && !w.purchased_by);
    } else if (currentTab === 'pending') {
        filteredWishes = wishes.filter(w => w.status === 'pending');
    } else if (currentTab === 'history') {
        filteredWishes = wishes.filter(w => w.status === 'purchased');
    }
    
    if (filteredWishes.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">Нет данных</div>
                <div>
                    ${currentTab === 'shop' ? 'Нет доступных желаний' : 
                      currentTab === 'pending' ? 'Нет желаний на одобрении' : 
                      'История покупок пуста'}
                </div>
                ${currentTab === 'shop' ? '<div style="font-size:12px; margin-top:8px;">Создайте новое желание!</div>' : ''}
            </div>
        `;
        return;
    }
    
    container.innerHTML = '<div class="wishes-grid" id="wishes-grid"></div>';
    const grid = document.getElementById('wishes-grid');
    
    filteredWishes.forEach(wish => {
        const canAfford = currentTab === 'shop' && (currentUser?.bonuses || 0) >= (wish.approved_price || wish.price);
        const isPending = wish.status === 'pending';
        const isPurchased = wish.status === 'purchased';
        
        const card = document.createElement('div');
        card.className = `wish-card ${isPending ? 'pending' : ''} ${isPurchased ? 'purchased' : ''}`;
        
        card.innerHTML = `
            <div class="wish-icon">${wish.icon || '🎁'}</div>
            <div class="wish-title">${escapeHtml(wish.title)}</div>
            ${renderWishImage(wish)}
            ${wish.description ? `<div class="wish-description">${escapeHtml(wish.description)}</div>` : ''}
            ${renderWishLink(wish)}
            <div class="wish-meta">

                <span class="wish-status ${wish.status}">${getStatusText(wish.status)}</span>
            </div>
            <div class="wish-actions" id="actions-${wish.id}">
                ${renderActions(wish, canAfford)}
            </div>
            <div class="wish-comments">
                ${renderComments(wish.id)}
                <div style="display:flex;gap:8px;">
                    <input id="comment-${wish.id}" type="text" placeholder="Комментарий..." style="margin:0;">
                    <button class="approve-btn" id="comment-btn-${wish.id}" style="padding:6px 10px;">Отправить</button>
                </div>
            </div>
        `;
        
        grid.appendChild(card);
        const commentBtn = document.getElementById(`comment-btn-${wish.id}`);
        if (commentBtn) commentBtn.onclick = () => addComment(wish.id);
        
        // === ВАЖНОЕ ИЗМЕНЕНИЕ: обработчики для всех вкладок ===
        
        // Кнопка "Купить" (только для shop)
        if (currentTab === 'shop' && !isPurchased) {
            const buyBtn = document.getElementById(`buy-${wish.id}`);
            if (buyBtn && canAfford) {
                buyBtn.onclick = () => buyWish(wish);
            }
        }
        
        // Кнопка "Удалить" для ВСЕХ вкладок (shop, history)
        const deleteBtn = document.getElementById(`delete-${wish.id}`);
        if (deleteBtn) {
            deleteBtn.onclick = () => deleteWish(wish);
        }
        
        // Кнопки для вкладки pending
        if (currentTab === 'pending') {
            const approveBtn = document.getElementById(`approve-${wish.id}`);
            const rejectBtn = document.getElementById(`reject-${wish.id}`);
            const priceInput = document.getElementById(`price-${wish.id}`);
            
            if (approveBtn) approveBtn.onclick = () => showApproveModal(wish, priceInput?.value);
            if (rejectBtn) rejectBtn.onclick = () => rejectWish(wish);
        }
    });
}

 function renderActions(wish, canAfford) {

    const deleteBtn = canDelete ? `<button class="reject-btn" id="delete-${wish.id}" style="margin-left:auto;">🗑</button>` : '';
    
    if (currentTab === 'shop') {
        if (canAfford) {
            return `<button class="buy-btn" id="buy-${wish.id}">Купить</button>${deleteBtn}`;
        } else {
            const need = (wish.approved_price || wish.price) - (currentUser?.bonuses || 0);

    }
    
    return '';
}

        async function createWish(wishData) {
            try {
                const response = await fetch(`${API_URL}/wishes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(wishData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Ошибка создания');
                }
                const created = await response.json();
                if (created?.id) {
                    localWishExtras[created.id] = {
                        linkUrl: wishData.linkUrl || '',
                        comments: []
                    };
                    localStorage.setItem('homespace_wish_extras', JSON.stringify(localWishExtras));
                }
                
                alert(currentUser?.role === 'parent' || currentUser?.role === 'user' ? '✨ Желание создано!' : '✨ Желание отправлено на одобрение!');
                setActiveTab('shop');
                await loadWishes();
            } catch (error) {
                console.error('Ошибка создания:', error);
                alert('❌ ' + error.message);
            }
        }

        async function buyWish(wish) {
            const price = wish.approved_price || wish.price;
            
            if ((currentUser?.bonuses || 0) < price) {
                alert(`Недостаточно бонусов! Нужно ещё ${price - (currentUser?.bonuses || 0)}💰`);
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/wishes/${wish.id}/purchase`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Ошибка покупки');
                }
                
                const result = await response.json();
                
                // Обновляем бонусы
                currentUser.bonuses = result.newBalance;
                localStorage.setItem('homespace_currentUser', JSON.stringify(currentUser));
                document.getElementById('user-bonuses').textContent = result.newBalance;
                
                alert(`Покупка выполнена: ${wish.title}`);
                await loadWishes();
            } catch (error) {
                console.error('Ошибка покупки:', error);
                alert('❌ ' + error.message);
            }
        }

        async function approveWish(wish, price) {
            try {
                const response = await fetch(`${API_URL}/wishes/${wish.id}/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ price: parseInt(price) })
                });
                
                if (!response.ok) throw new Error('Ошибка одобрения');
                
                alert(`✅ Желание "${wish.title}" одобрено за ${price} бонусов!`);
                await loadWishes();
            } catch (error) {
                console.error('Ошибка одобрения:', error);
                alert('❌ ' + error.message);
            }
        }

        async function rejectWish(wish) {
            if (!confirm(`Отклонить желание "${wish.title}"?`)) return;
            
            try {
                const response = await fetch(`${API_URL}/wishes/${wish.id}/reject`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                alert('❌ Желание отклонено');
                await loadWishes();
            } catch (error) {
                console.error('Ошибка отклонения:', error);
                alert('❌ ' + error.message);
            }
        }

        async function deleteWish(wish) {
    if (!confirm(`Удалить желание "${wish.title}"?`)) return;
    
    try {
        const response = await fetch(`${API_URL}/wishes/${wish.id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Ошибка удаления');
        }
        
        // ВАЖНО: перезагружаем список желаний
        await loadWishes();
        
        alert('🗑 Желание удалено');
    } catch (error) {
        console.error('Ошибка удаления:', error);
        alert('❌ ' + error.message);
    }
}

       async function pickWishImage() {
    const urlInput = document.getElementById('wish-image-url')?.value?.trim();
    if (urlInput) return urlInput;
    
    // Проверяем сохраненное обрезанное изображение
    const dataUrlInput = document.getElementById('wish-image-data-url');
    if (dataUrlInput?.value) return dataUrlInput.value;
    
    // Если нет обрезанного - берем оригинальное
    const fileInput = document.getElementById('wish-image-file');
    const file = fileInput?.files?.[0];
    if (!file) return null;
    return await toDataUrl(file);
}

        function toDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getAvatarHtml(avatar, name) {
            if (avatar && avatar.startsWith('/assets/uploads/')) {
                const fullUrl = 'http://localhost:3001' + avatar;
                return `<img src="${escapeHtml(fullUrl)}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;" alt="avatar">`;
            }
            const base = (name || 'П').trim();
            const parts = base.split(/\s+/).filter(Boolean).slice(0, 2);
            const initials = parts.map(p => p[0]?.toUpperCase() || '').join('') || 'U';
            return `<span style="font-size:18px;font-weight:700;color:#fff;">${escapeHtml(initials)}</span>`;
        }

        // ========== КРОППЕР ==========
        function toSquareDataUrl(file, size = 256) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        const side = Math.min(img.width, img.height);
                        const sx = (img.width - side) / 2;
                        const sy = (img.height - side) / 2;
                        const canvas = document.createElement('canvas');
                        canvas.width = size;
                        canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
                        resolve(canvas.toDataURL('image/jpeg', 0.9));
                    };
                    img.onerror = reject;
                    img.src = reader.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function openCropper(file, outSize = 256) {
            return new Promise((resolve, reject) => {
                const modal = document.getElementById('cropper-modal');
                const canvas = document.getElementById('cropper-canvas');
                const zoom = document.getElementById('cropper-zoom');
                const btnCancel = document.getElementById('cropper-cancel');
                const btnApply = document.getElementById('cropper-apply');
                if (!modal || !canvas || !zoom || !btnCancel || !btnApply) {
                    toSquareDataUrl(file, outSize).then(resolve).catch(reject);
                    return;
                }

                const ctx = canvas.getContext('2d');
                const reader = new FileReader();
                reader.onerror = () => reject(new Error('read error'));
                reader.onload = () => {
                    const img = new Image();
                    img.onerror = () => reject(new Error('image error'));
                    img.onload = () => {
                        const cw = canvas.width;
                        const ch = canvas.height;
                        const baseScale = Math.max(cw / img.width, ch / img.height);

                        cropperState = {
                            img,
                            cw,
                            ch,
                            baseScale,
                            zoom: 1,
                            offsetX: 0,
                            offsetY: 0,
                            dragging: false,
                            lastX: 0,
                            lastY: 0
                        };

                        zoom.value = '1';

                        const draw = () => {
                            if (!cropperState) return;
                            const s = cropperState.baseScale * cropperState.zoom;
                            const dw = img.width * s;
                            const dh = img.height * s;
                            let dx = (cw - dw) / 2 + cropperState.offsetX;
                            let dy = (ch - dh) / 2 + cropperState.offsetY;

                            const minDx = cw - dw;
                            const minDy = ch - dh;
                            dx = Math.min(0, Math.max(minDx, dx));
                            dy = Math.min(0, Math.max(minDy, dy));
                            cropperState.offsetX = dx - (cw - dw) / 2;
                            cropperState.offsetY = dy - (ch - dh) / 2;

                            ctx.clearRect(0, 0, cw, ch);
                            ctx.drawImage(img, dx, dy, dw, dh);
                        };

                        const onPointerDown = (ev) => {
                            ev.preventDefault();
                            canvas.setPointerCapture?.(ev.pointerId);
                            cropperState.dragging = true;
                            cropperState.lastX = ev.clientX;
                            cropperState.lastY = ev.clientY;
                        };
                        const onPointerMove = (ev) => {
                            if (!cropperState?.dragging) return;
                            ev.preventDefault();
                            const dx = ev.clientX - cropperState.lastX;
                            const dy = ev.clientY - cropperState.lastY;
                            cropperState.lastX = ev.clientX;
                            cropperState.lastY = ev.clientY;
                            cropperState.offsetX += dx;
                            cropperState.offsetY += dy;
                            draw();
                        };
                        const onPointerUp = (ev) => {
                            ev.preventDefault();
                            cropperState.dragging = false;
                        };

                        const cleanup = () => {
                            canvas.removeEventListener('pointerdown', onPointerDown);
                            canvas.removeEventListener('pointermove', onPointerMove);
                            canvas.removeEventListener('pointerup', onPointerUp);
                            canvas.removeEventListener('pointercancel', onPointerUp);
                            zoom.oninput = null;
                            btnCancel.onclick = null;
                            btnApply.onclick = null;
                            modal.onclick = null;
                            cropperState = null;
                            modal.classList.remove('active');
                        };

                        canvas.addEventListener('pointerdown', onPointerDown);
                        canvas.addEventListener('pointermove', onPointerMove);
                        canvas.addEventListener('pointerup', onPointerUp);
                        canvas.addEventListener('pointercancel', onPointerUp);

                        zoom.oninput = () => {
                            if (!cropperState) return;
                            cropperState.zoom = Math.max(1, Math.min(3, Number(zoom.value) || 1));
                            draw();
                        };

                        btnCancel.onclick = () => {
                            cleanup();
                            reject(new Error('cancelled'));
                        };
                        btnApply.onclick = () => {
                            try {
                                const out = document.createElement('canvas');
                                out.width = outSize;
                                out.height = outSize;
                                const octx = out.getContext('2d');
                                octx.drawImage(canvas, 0, 0, outSize, outSize);
                                const dataUrl = out.toDataURL('image/jpeg', 0.9);
                                cleanup();
                                resolve(dataUrl);
                            } catch (e) {
                                cleanup();
                                reject(e);
                            }
                        };

                        modal.onclick = (e) => {
                            if (e.target === modal) {
                                cleanup();
                                reject(new Error('cancelled'));
                            }
                        };

                        modal.classList.add('active');
                        draw();
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // Запуск
        init();
    </script>
</body>
</html>
